<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - LGU Reservation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="./css/styles.css" rel="stylesheet">
  </head>
  <body>
    <main class="auth-page login-page">
      <div class="auth-overlay"></div>

      <section class="auth-shell login-shell">
        <div class="auth-brand">
          <div class="brand-badge">
  <img src="./image/LGU BATUAN LOGO OFFICIAL.png" alt="LGU Batuan Logo">
</div>
            <p class="brand-kicker">Facility Reservation System</p>
            <h1>Welcome </h1>
            <p class="brand-copy">Access the LGU Batuan Reservation System with your account to manage requests, schedules, and records.</p>
          </div>
        </div>

        <div class="auth-card">
          <div class="auth-card__header">
            <h2>Login</h2>
            <p>Sign in to continue to the dashboard.</p>
          </div>

          <form id="loginForm" class="auth-form" novalidate>
            <div class="field-row">
              <label for="user_name">Username</label>
              <input id="user_name" name="user_name" type="text" placeholder="Enter your username" autocomplete="username" required>
            </div>

            <div class="field-row password-field">
              <label for="password">Password</label>
              <div class="password-wrap">
                <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
                <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">Show</button>
              </div>
            </div>

            <p id="loginMessage" class="form-message" aria-live="polite"></p>

            <button type="submit" class="signup-button login-button">Login</button>
          </form>
        </div>
      </section>
    </main>

    <script src="./js/script.js"></script>
  </body>
</html>
